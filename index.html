<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS_SYSTEM v2.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #020205; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Interfaz holográfica superior */
        .hud-jarvis {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            border-left: 3px solid #00f0ff;
            background: rgba(2, 8, 15, 0.85);
            padding: 10px 18px;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            z-index: 5;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
            letter-spacing: 1px;
            pointer-events: none;
            width: 85%;
            max-width: 320px;
        }
        .hud-jarvis span { color: #ff3b30; }
    </style>
</head>
<body>

    <div id="jarvisHUD" class="hud-jarvis">CORE_STATUS: <span id="percent">0%</span> // ENERGÍA ESTABLE</div>
    <canvas id="ironCanvas"></canvas>

    <script>
        const canvas = document.getElementById('ironCanvas');
        const ctx = canvas.getContext('2d');
        const percentText = document.getElementById('percent');

        let w, h, cX, cY;
        let particulas = [];
        let fase = "BOTEO";
        let tControl = 0;
        let cargaCore = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function initFX() {
            particulas = [];
            for(let i=0; i<40; i++) {
                particulas.push({
                    x: cX + (Math.random() - 0.5) * 120,
                    y: cY + (Math.random() - 0.5) * 200,
                    vy: -(Math.random() * 2 + 1),
                    r: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.5
                });
            }
        }

        // MOTOR GRÁFICO: CONSTRUCCIÓN DE LA ARMADURA METÁLICA
        function dibujarArmadura(x, y, t) {
            ctx.save();
            ctx.translate(x, y);
            
            // Efecto de flotación magnética (Sway)
            let flotar = Math.sin(t * 0.004) * 5;
            ctx.translate(0, flotar);

            // DEFINICIÓN DE DEGRADADOS METÁLICOS PREMIUM
            // Rojo Metalizado (Armadura principal)
            let rojoMetal = ctx.createLinearGradient(-30, 0, 30, 0);
            rojoMetal.addColorStop(0, "#4a0004");
            rojoMetal.addColorStop(0.3, "#99000d");
            rojoMetal.addColorStop(0.5, "#e60012"); // Brillo central
            rojoMetal.addColorStop(0.8, "#99000d");
            rojoMetal.addColorStop(1, "#260002");

            // Dorado de Titanio (Hombros y detalles)
            let oroMetal = ctx.createLinearGradient(-20, 0, 20, 0);
            oroMetal.addColorStop(0, "#664d00");
            oroMetal.addColorStop(0.4, "#cca300");
            oroMetal.addColorStop(0.6, "#ffe680"); // Reflejo de luz pura
            oroMetal.addColorStop(0.9, "#b38f00");
            oroMetal.addColorStop(1, "#332600");

            // --- 1. HOMBROS Y BRAZOS ---
            ctx.fillStyle = oroMetal;
            // Hombro izquierdo
            ctx.beginPath(); ctx.moveTo(-45, -55); ctx.lineTo(-25, -60); ctx.lineTo(-20, -35); ctx.lineTo(-40, -30); ctx.closePath(); ctx.fill();
            // Hombro derecho
            ctx.beginPath(); ctx.moveTo(45, -55); ctx.lineTo(25, -60); ctx.lineTo(20, -35); ctx.lineTo(40, -30); ctx.closePath(); ctx.fill();

            ctx.fillStyle = rojoMetal;
            // Brazos caídos laterales
            ctx.fillRect(-44, -25, 12, 65);
            ctx.fillRect(32, -25, 12, 65);

            // --- 2. TORSO / PECHO PRINCIPAL ---
            ctx.fillStyle = rojoMetal;
            ctx.beginPath();
            ctx.moveTo(-25, -60);
            ctx.lineTo(25, -60);
            ctx.lineTo(32, -20);
            ctx.lineTo(20, 20);
            ctx.lineTo(-20, 20);
            ctx.lineTo(-32, -20);
            ctx.closePath();
            ctx.fill();

            // Placas doradas abdominales interconectadas
            ctx.fillStyle = oroMetal;
            ctx.fillRect(-15, -15, 30, 8);
            ctx.fillRect(-12, -2, 24, 8);
            ctx.fillRect(-14, 10, 28, 7);

            // --- 3. CUELLO Y CASCO ---
            ctx.fillStyle = rojoMetal;
            ctx.fillRect(-8, -72, 16, 15); // Cuello base

            // Casco principal (Forma curva aerodinámica)
            ctx.beginPath();
            ctx.arc(0, -88, 18, 0, Math.PI * 2);
            ctx.fill();
            // Mandíbula/Mentón afilado
            ctx.beginPath();
            ctx.moveTo(-18, -88); ctx.lineTo(-12, -66); ctx.lineTo(12, -66); ctx.lineTo(18, -88);
            ctx.closePath(); ctx.fill();

            // Placa frontal dorada del rostro (Máscara icónica)
            ctx.fillStyle = oroMetal;
            ctx.beginPath();
            ctx.moveTo(-11, -96); ctx.lineTo(11, -96);
            ctx.lineTo(13, -82); ctx.lineTo(9, -70); ctx.lineTo(-9, -70); ctx.lineTo(-13, -82);
            ctx.closePath(); ctx.fill();

            // --- 4. SISTEMAS DE LUZ (REPOSITORIO GLOW) ---
            ctx.save();
            ctx.shadowBlur = 15;

            // Ojos Azules Brillantes (Modo HUD activado)
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "#00f0ff";
            ctx.fillRect(-8, -86, 5, 2);
            ctx.fillRect(3, -86, 5, 2);

            // REACTOR ARC CENTRAL TRANGULAR DEL PECHO
            if (fase === "ONLINE" || (fase === "BOTEO" && t % 40 < 25)) {
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = "#00f0ff";
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(0, -48);
                ctx.lineTo(11, -30);
                ctx.lineTo(-11, -30);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();

            ctx.restore();
        }

        function gestionarParticulas(t) {
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            for (let i = particulas.length - 1; i >= 0; i--) {
                let p = particulas[i];
                p.y += p.vy;
                p.alpha -= 0.01;

                if (p.alpha <= 0) {
                    p.y = cY + 110;
                    p.x = cX + (Math.random() - 0.5) * 60;
                    p.alpha = 1;
                }

                ctx.fillStyle = `rgba(0, 240, 255, ${p.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00f0ff";
                ctx.beginPath();
                ctx.arc(p.x, p.y + Math.sin(t*0.004)*5, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function render() {
            // Fondo oscuro puro con estela tecnológica baja
            ctx.fillStyle = "rgba(2, 2, 5, 0.15)";
            ctx.fillRect(0, 0, w, h);

            let time = Date.now();

            if (fase === "BOTEO") {
                // Simulación de carga del sistema Jarvis
                if (cargaCore < 100) {
                    cargaCore += 0.8;
                    percentText.innerText = `${Math.floor(cargaCore)}%`;
                } else {
                    fase = "ONLINE";
                    document.getElementById('jarvisHUD').innerHTML = "SYSTEM: <span>ONLINE</span> // ACCESO CONCEDIDO";
                }

                // Parpadeo de arranque: Solo se ven los ojos y el reactor cargando energía
                ctx.save();
                ctx.translate(cX, cY - 20);
                ctx.shadowBlur = 20; ctx.shadowColor = "#00f0ff";
                ctx.fillStyle = "#ffffff";
                // Ojos
                ctx.fillRect(-8, -86, 5, 2); ctx.fillRect(3, -86, 5, 2);
                // Reactor inestable
                if (Math.random() > 0.3) {
                    ctx.beginPath(); ctx.moveTo(0, -48); ctx.lineTo(10, -30); ctx.lineTo(-10, -30); ctx.closePath(); ctx.fill();
                }
                ctx.restore();

            } else if (fase === "ONLINE") {
                // Dibujar la cuadrícula holográfica de fondo (Interfaz táctica de Stark)
                ctx.strokeStyle = "rgba(0, 240, 255, 0.02)";
                ctx.lineWidth = 1;
                for(let i = 0; i < w; i += 40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
                }

                // Generar las partículas repulsoras de los propulsores inferiores
                gestionarParticulas(time);

                // Dibujar el modelo completo con brillos metálicos avanzados
                dibujarArmadura(cX, cY - 20, time);
            }

            requestAnimationFrame(render);
        }

        initFX();
        render();
    </script>
</body>
    </html>
