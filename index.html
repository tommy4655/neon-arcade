<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Regalo para Mamá</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        body, html { width: 100%; height: 100%; background: #040206; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

    <canvas id="introCanvas"></canvas>

    <script>
        const canvas = document.getElementById('introCanvas');
        const ctx = canvas.getContext('2d');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        let cX = w / 2, cY = h / 2;

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        });

        // Configuración del texto "BIENVENIDO"
        const textoDestino = "BIENVENIDO";
        ctx.font = "bold 42px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // Medir dónde debe terminar cada letra en el centro de la pantalla
        const anchoTexto = ctx.measureText(textoDestino).width;
        let inicioX = cX - anchoTexto / 2;
        
        let fragmentos = [];

        // Crear los pedazos rotos dispersos por los bordes de la pantalla
        for (let i = 0; i < textoDestino.length; i++) {
            let letra = textoDestino[i];
            let xDestino = inicioX + ctx.measureText(textoDestino.substring(0, i)).width + ctx.measureText(letra).width / 2;
            let yDestino = cY;

            // Ángulo aleatorio para que salgan disparados desde cualquier lado como un estallido inverso
            let angulo = Math.random() * Math.PI * 2;
            let distanciaFuera = Math.max(w, h) * 0.8; 

            fragmentos.push({
                letra: letra,
                // Posición inicial rota/dispersa en el espacio
                x: cX + Math.cos(angulo) * distanciaFuera + (Math.random() * 100 - 50),
                y: cY + Math.sin(angulo) * distanciaFuera + (Math.random() * 100 - 50),
                // Destino final exacto
                targetX: xDestino,
                targetY: yDestino,
                // Rotación del fragmento de vidrio
                rotacion: Math.random() * Math.PI * 4,
                targetRotacion: 0,
                // Velocidad de atracción
                easing: 0.04 + (Math.random() * 0.02)
            });
        }

        function animar() {
            // Fondo oscuro con un sutil rastro elegante
            ctx.fillStyle = 'rgba(4, 2, 6, 0.2)';
            ctx.fillRect(0, 0, w, h);

            let todosListos = true;

            fragmentos.forEach(p => {
                // Interpolación matemática lineal (atracción elástica hacia el centro)
                let dx = p.targetX - p.x;
                let dy = p.targetY - p.y;
                
                p.x += dx * p.easing;
                p.y += dy * p.easing;
                p.rotacion += (p.targetRotacion - p.rotacion) * p.easing;

                // Dibujar el fragmento con su respectiva letra y rotación de cristal
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotacion);

                // Efecto de brillo neón dorado/rosado elegante para las letras
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff527b';
                ctx.fillStyle = '#ffffff';
                
                ctx.fillText(p.letra, 0, 0);
                ctx.restore();

                // Verificar si falta mucho para que se unan por completo
                if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                    todosListos = false;
                }
            });

            if (!todosListos) {
                requestAnimationFrame(animar);
            } else {
                // Cuando las letras ya se juntaron por completo, dejamos el texto fijo y brillante
                ctx.fillStyle = '#040206';
                ctx.fillRect(0, 0, w, h);
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff3385';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(textoDestino, cX, cY);
                ctx.restore();
                
                console.log("Intro terminada. Listo para la siguiente fase.");
            }
        }

        // Iniciar el efecto un segundo después de cargar
        setTimeout(animar, 1000);
    </script>
</body>
</html>
