<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N.E.O.N. ORBITAL ENGINE v3.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #010409; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Capa de Telemetría Táctica igual a la imagen */
        .hud-matrix {
            position: absolute;
            bottom: 25px;
            left: 25px;
            color: #00e5ff;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0,229,255,0.5);
            pointer-events: none;
            z-index: 10;
        }
        .hud-right {
            position: absolute;
            bottom: 25px;
            right: 25px;
            color: #bd00ff;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(189,0,255,0.5);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hud-matrix">N.E.O.N. ORBITAL ENGINE - v3.1 | ACTIVE PLANETS: 5</div>
    <div class="hud-right">// SYSTEM_OPERATIVE //</div>
    <canvas id="spaceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let cX, cY, w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Configuración de los cuerpos celestes con capas dinámicas
        const sun = { r: 55, pulse: 0 };
        const planets = [
            { dist: 110, size: 7, speed: 0.025, angle: 0, color: '#9bc4e2', coreColor: '#3a78a6', orbits: [] },
            { dist: 160, size: 9, speed: 0.018, angle: 1.2, color: '#e5a65d', coreColor: '#b06d26', orbits: [] },
            { dist: 220, size: 14, speed: 0.012, angle: 3.4, color: '#dfb76c', coreColor: '#967332', hasRing: true, orbits: [] },
            { dist: 290, size: 8, speed: 0.009, angle: 4.8, color: '#8cb9bd', coreColor: '#4b777a', orbits: [] }
        ];

        function drawCyberGrid() {
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.04)';
            ctx.lineWidth = 1;
            
            // Rejilla de deformación de gravedad
            for(let i = 0; i < w; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
            }
            for(let j = 0; j < h; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(w, j); ctx.stroke();
            }

            // Red elíptica de fondo (Efecto de embudo gravitatorio)
            ctx.strokeStyle = 'rgba(189, 0, 255, 0.03)';
            ctx.setLineDash([2, 4]);
            for(let r = 50; r < Math.max(w, h); r += 60) {
                ctx.beginPath();
                ctx.arc(cX, cY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
        }

        function renderEngine() {
            // Fondo hiper-oscuro espacial
            ctx.fillStyle = '#02050a';
            ctx.fillRect(0, 0, w, h);

            // 1. Dibujar la rejilla cibernética de la imagen
            drawCyberGrid();

            // 2. Renderizar el Sol hiper-realista con capas de fuego
            sun.pulse = Math.sin(Date.now() * 0.004) * 3;
            let solGrad = ctx.createRadialGradient(cX, cY, 5, cX, cY, sun.r + sun.pulse);
            solGrad.addColorStop(0, '#ffffff');
            solGrad.addColorStop(0.2, '#ffea4a');
            solGrad.addColorStop(0.5, '#ff7700');
            solGrad.addColorStop(0.8, '#ff2200');
            solGrad.addColorStop(1, 'transparent');

            ctx.save();
            ctx.shadowBlur = 45;
            ctx.shadowColor = '#ff5500';
            ctx.fillStyle = solGrad;
            ctx.beginPath();
            ctx.arc(cX, cY, sun.r + 30 + sun.pulse, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Llamaradas solares simuladas (Rayos de plasma de la imagen)
            ctx.strokeStyle = 'rgba(255, 119, 0, 0.06)';
            ctx.lineWidth = 2;
            for(let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
                let s = Math.sin(Date.now() * 0.002 + a) * 15;
                ctx.beginPath();
                ctx.moveTo(cX, cY);
                ctx.lineTo(cX + Math.cos(a) * (sun.r + 60 + s), cY + Math.sin(a) * (sun.r + 60 + s));
                ctx.stroke();
            }

            // 3. Renderizar Planetas Avanzados con sus órbitas elípticas
            planets.forEach(p => {
                p.angle += p.speed;
                let px = cX + Math.cos(p.angle) * p.dist;
                let py = cY + Math.sin(p.angle) * p.dist * 0.85; // Ligera inclinación 3D de órbita

                // Guardar rastro geométrico perfecto
                p.orbits.push({x: px, y: py});
                if(p.orbits.length > 70) p.orbits.shift();

                // Dibujar línea elíptica de datos (Línea Cyan de la imagen)
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.18)';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.arc(cX, cY, p.dist, 0, Math.PI * 2);
                ctx.save();
                ctx.scale(1, 0.85); // Emparejar con la perspectiva del planeta
                ctx.restore();
                
                // Rastro real acumulado
                ctx.beginPath();
                p.orbits.forEach((pt, idx) => {
                    if(idx === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                });
                ctx.stroke();

                // Esfera planetaria en 3D (Gradiente de sombra para simular volumen con la luz del sol)
                let planGrad = ctx.createRadialGradient(px - p.size*0.3, py - p.size*0.3, 1, px, py, p.size);
                planGrad.addColorStop(0, p.color);
                planGrad.addColorStop(0.7, p.coreColor);
                planGrad.addColorStop(1, '#000000');

                ctx.save();
                ctx.fillStyle = planGrad;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(px, py, p.size, 0, Math.PI * 2);
                ctx.fill();

                // Si es Saturno, dibujar anillo estilizado
                if(p.hasRing) {
                    ctx.strokeStyle = 'rgba(223, 183, 108, 0.6)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(px, py, p.size * 1.8, p.size * 0.5, -0.2, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            });

            requestAnimationFrame(renderEngine);
        }

        renderEngine();
    </script>
</body>
        </html>
