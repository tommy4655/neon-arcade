<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N.E.O.N. ORBITAL ENGINE - v3.1</title>
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-purple: #bd00ff;
            --neon-blue: #008cff;
            --dark-space: #010408;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        body {
            background-color: var(--dark-space);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #orbitalCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #051021 0%, #010408 100%);
        }

        /* HUD Táctico (Heads-Up Display) de N.E.O.N. */
        .telemetria {
            position: absolute;
            bottom: 25px;
            left: 25px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            letter-spacing: 1px;
            pointer-events: none;
            text-transform: uppercase;
        }

        .logo-neon {
            position: absolute;
            bottom: 20px;
            right: 25px;
            width: 60px;
            height: 60px;
            opacity: 0.9;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="telemetria">
        N.E.O.N. ORBITAL ENGINE - v3.1 | ACTIVE PLANETS: <span id="contador-planetas">0</span>
    </div>

    <svg class="logo-neon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 Z" stroke="#00e5ff" stroke-width="2" fill="none"/>
        <path d="M10 30 L50 50 L90 30 M50 50 L50 90 M10 70 L50 50 L90 70" stroke="#00e5ff" stroke-width="1" fill="none"/>
        <text x="50%" y="55%" text-anchor="middle" dy=".3em" fill="#00e5ff" font-family="monospace" font-size="20" font-weight="bold">N.E.O.N.</text>
    </svg>

    <canvas id="orbitalCanvas"></canvas>

    <script>
        const canvas = document.getElementById('orbitalCanvas');
        const ctx = canvas.getContext('2d');
        const txtPlanetas = document.getElementById('contador-planetas');

        let centroX, centroY;
        const G = 0.2; // Constante gravitatoria avanzada

        let planetas = [];

        // Sol Central Pulsante (El de la imagen HD)
        const Sol = {
            x: 0,
            y: 0,
            masa: 18000,
            radio: 40,
            colorSol: '#ff6a00',
            colorFlares: '#ff2a00',
            pulso: 0
        };

        function ajustarDimensiones() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centroX = canvas.width / 2;
            centroY = canvas.height / 2;
            Sol.x = centroX;
            Sol.y = centroY;
        }
        window.addEventListener('resize', ajustarDimensiones);
        ajustarDimensiones();

        // --- SISTEMA FÍSICO DE ÓRBITAS TÁCTICAS ---
        function bucleMotor() {
            // Limpieza con rastro sutil
            ctx.fillStyle = 'rgba(1, 4, 8, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Renderizar Sol Central con brillo avanzado
            Sol.pulso = Math.sin(Date.now() * 0.005) * 3;
            ctx.save();
            ctx.fillStyle = Sol.colorSol;
            ctx.shadowBlur = 40 + Sol.pulso * 3;
            ctx.shadowColor = Sol.colorFlares;
            ctx.beginPath();
            ctx.arc(Sol.x, Sol.y, Sol.radio + Sol.pulso, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 2. Calcular Físicas Gravitatorias y Órbitas Geométricas
            for (let i = planetas.length - 1; i >= 0; i--) {
                let p = planetas[i];

                // Físicas (Newton)
                const dx = Sol.x - p.x;
                const dy = Sol.y - p.y;
                const distancia = Math.hypot(dx, dy);

                // Colisión Solar
                if (distancia <= Sol.radio + p.radio) {
                    planetas.splice(i, 1);
                    txtPlanetas.textContent = planetas.length;
                    continue;
                }

                const fuerza = (G * Sol.masa * p.masa) / (distancia * distancia);
                const ax = (fuerza * (dx / distancia)) / p.masa;
                const ay = (fuerza * (dy / distancia)) / p.masa;

                p.vx += ax;
                p.vy += ay;
                p.x += p.vx;
                p.y += p.vy;

                // 3. Dibujar Órbitas Geométricas (Líneas Cyan Tácticas)
                p.estela.push({ x: p.x, y: p.y });
                if (p.estela.length > 50) p.estela.shift();

                ctx.strokeStyle = p.colorOrbita;
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                for (let j = 0; j < p.estela.length; j++) {
                    if (j === 0) ctx.moveTo(p.estela[j].x, p.estela[j].y);
                    else ctx.lineTo(p.estela[j].x, p.estela[j].y);
                }
                ctx.stroke();
                ctx.globalAlpha = 1.0;

                // 4. Dibujar Cuerpo Planetario HD
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radio, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(bucleMotor);
        }

        // --- SISTEMA DE INYECCIÓN DE PLANETAS (Táctil) ---
        // Para pruebas, lanzamos 3 planetas automáticos para ver el motor
        setTimeout(() => lanzarPlaneta('Tierrra', centroX + 150, centroY, 0, -4.5, 7, '#00e5ff'), 500);
        setTimeout(() => lanzarPlaneta('Marte', centroX + 220, centroY, 0, -3.8, 5, '#ff4d4d'), 1000);
        setTimeout(() => lanzarPlaneta('Júpiter', centroX - 350, centroY, 0, 3.2, 12, '#f0d6b4', '#bd00ff'), 1500);

        function lanzarPlaneta(nombre, x, y, vx, vy, radio, color, colorOrbita = '#00e5ff') {
            planetas.push({
                nombre: nombre,
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                radio: radio,
                masa: radio * 2,
                color: color,
                colorOrbita: colorOrbita, // Cyan o Púrpura según la imagen
                estela: []
            });
            txtPlanetas.textContent = planetas.length;
        }

        requestAnimationFrame(bucleMotor);
    </script>
</body>
</html>
