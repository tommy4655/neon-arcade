<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N.E.O.N. ORBITAL ENGINE v3.2 PREMIUM</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none;
        }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #010307; 
            font-family: 'Courier New', Courier, monospace; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        
        /* HUD Superior */
        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(0, 229, 255, 0.4);
            font-size: 10px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
        }

        /* HUD Inferior */
        .hud-footer {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00e5ff;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            pointer-events: none;
            z-index: 10;
            border-top: 1px solid rgba(0, 229, 255, 0.15);
            padding-top: 12px;
        }
        .hud-status { 
            color: #bd00ff; 
            text-shadow: 0 0 8px rgba(189, 0, 255, 0.6); 
        }

        /* Tarjetas de telemetría flotantes idénticas al render */
        .planet-card {
            position: absolute;
            background: rgba(2, 6, 14, 0.85);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-left: 3px solid #00e5ff;
            padding: 6px 10px;
            color: #ffffff;
            font-size: 9px;
            pointer-events: none;
            z-index: 5;
            transform: translate(15px, -50%);
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            line-height: 1.4;
            white-space: nowrap;
        }
        .planet-card b { 
            color: #ffffff; 
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }
        .planet-card span { 
            color: #00e5ff; 
        }
    </style>
</head>
<body>

    <div class="hud-top">SYS_STATUS: CORE_ONLINE // GRAVITY_LOCK</div>
    
    <div id="ui-container" style="position: absolute; width:100%; height:100%; z-index:5; pointer-events:none;"></div>

    <div class="hud-footer">
        <div>N.E.O.N. ORBITAL ENGINE - v3.2 | ACTIVE PLANETS: <span id="count">4</span></div>
        <div class="hud-status">// SYSTEM_OPERATIVE //</div>
    </div>

    <canvas id="universeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('universeCanvas');
        const ctx = canvas.getContext('2d');
        const uiContainer = document.getElementById('ui-container');

        let cX, cY, w, h;
        let stars = [];
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
            generarPolvoEstelar();
        }

        function generarPolvoEstelar() {
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({ 
                    x: Math.random() * w, 
                    y: Math.random() * h, 
                    r: Math.random() * 1.3, 
                    alpha: Math.random() * 0.7 + 0.3 
                });
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Configuración matemática de los cuerpos celestes con excentricidad elíptica (ecc)
        const planets = [
            { id: "venus", name: "Venus", dist: 95, size: 5, speed: 0.024, angle: 0, color: '#ffb366', coreColor: '#b35900', ecc: 0.88, data: "Dist: 0.72 AU<br>Vel: 35.0 km/s" },
            { id: "earth", name: "Earth", dist: 145, size: 7.5, speed: 0.017, angle: 2.1, color: '#66ccff', coreColor: '#0059b3', ecc: 0.86, data: "Dist: 1.00 AU<br>Vel: 29.8 km/s" },
            { id: "mars", name: "Mars", dist: 205, size: 5.5, speed: 0.013, angle: 4.3, color: '#ff6666', coreColor: '#b30000', ecc: 0.90, data: "Dist: 1.52 AU<br>Vel: 24.0 km/s" },
            { id: "saturn", name: "Saturn", dist: 285, size: 13, speed: 0.008, angle: 1.2, color: '#ffe6b3', coreColor: '#997326', ecc: 0.83, hasRing: true, data: "Dist: 9.58 AU<br>Vel: 9.7 km/s" }
        ];

        // Inyección dinámica de las tarjetas de datos al DOM
        planets.forEach(p => {
            const card = document.createElement('div');
            card.id = `card-${p.id}`;
            card.className = 'planet-card';
            card.innerHTML = `<b>${p.name.toUpperCase()}</b>${p.data}`;
            uiContainer.appendChild(card);
        });

        function renderEngine() {
            // Fondo hiper-oscuro
            ctx.fillStyle = '#010408';
            ctx.fillRect(0, 0, w, h);

            // 1. Renderizar Polvo Estelar Centelleante
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.globalAlpha = s.alpha * (0.6 + Math.sin(Date.now() * 0.0015 + s.x) * 0.4);
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); 
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // 2. Renderizar Rejilla de Vectores Tácticos (Líneas Azules)
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.025)';
            ctx.lineWidth = 1;
            for(let i = 0; i < w; i += 60) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
            }
            // Líneas de curvatura orbital concéntrica de fondo
            ctx.strokeStyle = 'rgba(189, 0, 255, 0.03)';
            for(let r = 70; r < Math.max(w, h); r += 65) {
                ctx.beginPath(); ctx.arc(cX, cY, r, 0, Math.PI * 2); ctx.stroke();
            }

            // 3. Renderizar Núcleo Solar Avanzado con Mezcla Lumínica (Glow)
            let time = Date.now();
            let solPulse = Math.sin(time * 0.004) * 2.5;
            
            ctx.save();
            ctx.globalCompositeOperation = 'screen'; // Fusión aditiva para brillo real
            
            // Capa térmica exterior expansiva
            let glowGrad = ctx.createRadialGradient(cX, cY, 8, cX, cY, 68 + solPulse);
            glowGrad.addColorStop(0, 'rgba(255, 220, 0, 1)');
            glowGrad.addColorStop(0.25, 'rgba(255, 95, 0, 0.65)');
            glowGrad.addColorStop(0.6, 'rgba(230, 25, 0, 0.25)');
            glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath(); 
            ctx.arc(cX, cY, 75 + solPulse, 0, Math.PI * 2); 
            ctx.fill();

            // Esfera central densa del Sol
            let sunGrad = ctx.createRadialGradient(cX, cY, 0, cX, cY, 36);
            sunGrad.addColorStop(0, '#ffffff');
            sunGrad.addColorStop(0.5, '#ffcc00');
            sunGrad.addColorStop(1, '#ff3300');
            ctx.fillStyle = sunGrad;
            ctx.beginPath(); 
            ctx.arc(cX, cY, 38, 0, Math.PI * 2); 
            ctx.fill();
            
            // Rayos vectoriales oscilantes (Llamaradas de plasma controladas)
            ctx.strokeStyle = 'rgba(255, 95, 0, 0.18)';
            ctx.lineWidth = 1.5;
            for(let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
                let length = 58 + Math.sin(time * 0.003 + a) * 6;
                ctx.beginPath(); 
                ctx.moveTo(cX, cY);
                ctx.lineTo(cX + Math.cos(a) * length, cY + Math.sin(a) * length);
                ctx.stroke();
            }
            ctx.restore();

            // 4. Renderizar Órbitas Elípticas y Esferas 3D de los Planetas
            planets.forEach(p => {
                p.angle += p.speed;
                
                // Coordenadas calculadas bajo la elipse del plano orbital inclinado
                let px = cX + Math.cos(p.angle) * p.dist;
                let py = cY + Math.sin(p.angle) * p.dist * p.ecc;

                // Trazado de órbita cian de alta definición
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.22)';
                ctx.lineWidth = 1.1;
                ctx.save();
                ctx.translate(cX, cY);
                ctx.scale(1, p.ecc);
                ctx.beginPath();
                ctx.arc(0, 0, p.dist, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();

                // Proyección de Sombra 3D (Gradiente radial inverso a la posición del Sol)
                let angToSun = Math.atan2(py - cY, px - cX);
                let shadowX = px + Math.cos(angToSun + Math.PI) * (p.size * 0.35);
                let shadowY = py + Math.sin(angToSun + Math.PI) * (p.size * 0.35);

                let pGrad = ctx.createRadialGradient(shadowX, shadowY, 1, px, py, p.size);
                pGrad.addColorStop(0, p.color);
                pGrad.addColorStop(0.75, p.coreColor);
                pGrad.addColorStop(1, '#02050a');

                ctx.save();
                ctx.fillStyle = pGrad;
                ctx.shadowBlur = 6;
                ctx.shadowColor = p.color;
                ctx.beginPath(); 
                ctx.arc(px, py, p.size, 0, Math.PI * 2); 
                ctx.fill();

                // Anillo de Saturno con inclinación matemática calculada
                if(p.hasRing) {
                    ctx.strokeStyle = 'rgba(235, 195, 120, 0.45)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.ellipse(px, py, p.size * 1.7, p.size * 0.38, -0.12, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();

                // 5. Vincular y mover las cajas DOM en tiempo real sobre la pantalla
                const card = document.getElementById(`card-${p.id}`);
                if (card) {
                    card.style.left = `${px}px`;
                    card.style.top = `${py}px`;
                }
            });

            requestAnimationFrame(renderEngine);
        }

        // Ejecutar el ciclo de renderizado
        renderEngine();
    </script>
</body>
</html>
