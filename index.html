<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROBOT_MOM v1.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #050811; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Consola de datos del robot */
        .console-hud {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 12, 26, 0.9);
            border: 1px solid rgba(0, 200, 255, 0.4);
            border-bottom: 3px solid #00c8ff;
            padding: 12px 20px;
            color: #ffffff;
            font-size: 11px;
            z-index: 5;
            box-shadow: 0 0 20px rgba(0,200,255,0.2);
            width: 85%;
            max-width: 340px;
        }
        .console-hud .status { color: #00c8ff; font-weight: bold; margin-bottom: 4px; }
        .console-hud .output { color: #fff; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="console-hud">
        <div class="status">🤖 ROVER_SYSTEM: ONLINE // ESCANEANDO...</div>
        <div id="robotOutput" class="output">> INICIALIZANDO LOGS</div>
    </div>
    
    <canvas id="robotCanvas"></canvas>

    <script>
        const canvas = document.getElementById('robotCanvas');
        const ctx = canvas.getContext('2d');
        const robotOutput = document.getElementById('robotOutput');

        let w, h, cX, cY;
        let fase = "INTRO";
        let tiempoControl = 0;
        let fragmentos = [];
        const textoIntro = "ROBOT_MOM";

        const mensajesRobot = [
            "TRANSMISIÓN: TE AMO MUCHO MAMÁ",
            "DATOS: SOS EL MOTOR DE MI CÓDIGO",
            "ALERTA: EXCESO DE AMOR DETECTADO",
            "OBJETIVO: HACERTE SONREÍR HOY"
        ];
        let fraseIndex = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function inicializarIntro() {
            fragmentos = [];
            ctx.font = "bold 40px monospace";
            const anchoTotal = ctx.measureText(textoIntro).width;
            let startX = cX - anchoTotal / 2;

            for (let i = 0; i < textoIntro.length; i++) {
                let letra = textoIntro[i];
                let targetX = startX + ctx.measureText(textoIntro.substring(0, i)).width + ctx.measureText(letra).width / 2;
                let angulo = Math.random() * Math.PI * 2;
                let radio = Math.max(w, h) * 1.2;

                fragmentos.push({
                    letra: letra,
                    x: cX + Math.cos(angulo) * radio,
                    y: cY + Math.sin(angulo) * radio,
                    targetX: targetX, targetY: cY,
                    rotacion: Math.random() * Math.PI * 4,
                    velocidad: 0.04
                });
            }
        }

        function actualizarConsola() {
            robotOutput.innerText = `> ${mensajesRobot[fraseIndex]}`;
            fraseIndex = (fraseIndex + 1) % mensajesRobot.length;
        }

        // MOTOR GRÁFICO DEL ROBOT
        function dibujarRobot(x, y, tiempo) {
            ctx.save();
            ctx.translate(x, y);

            // Efecto sutil de balanceo flotante por amortiguación
            let bounce = Math.sin(tiempo * 0.005) * 3;
            ctx.translate(0, bounce);

            // 1. LAS ORUGAS / LLANTAS (Base del Robot)
            ctx.fillStyle = "#162238";
            ctx.strokeStyle = "#3b5998";
            ctx.lineWidth = 2;
            ctx.fillRect(-50, 30, 100, 16);
            ctx.strokeRect(-50, 30, 100, 16);

            // Mini ruedas girando internamente
            ctx.fillStyle = "#00c8ff";
            let rX = Math.sin(tiempo * 0.01) * 4;
            for(let offset = -40; offset <= 40; offset += 20) {
                ctx.beginPath();
                ctx.arc(offset + rX, 38, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // 2. CUERPO CENTRAL (Chasis metálico)
            ctx.fillStyle = "#1e2e4a";
            ctx.fillRect(-35, -15, 70, 45);
            ctx.strokeRect(-35, -15, 70, 45);
            
            // Luz de batería / Núcleo en el pecho
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00c8ff";
            ctx.fillStyle = "rgba(0, 200, 255, " + (0.5 + Math.sin(tiempo * 0.01) * 0.5) + ")";
            ctx.fillRect(-10, 0, 20, 10);
            ctx.restore();

            // 3. CUELLO Y CABEZA GIRATORIA
            ctx.fillStyle = "#283e66";
            ctx.fillRect(-5, -25, 10, 10); // Cuello

            // Movimiento de la cabeza de lado a lado escaneando
            let anguloEscaneo = Math.sin(tiempo * 0.003) * 0.4;
            ctx.translate(0, -25);
            ctx.rotate(anguloEscaneo);

            ctx.fillStyle = "#1e2e4a";
            ctx.fillRect(-20, -14, 40, 14); // Cabeza
            ctx.strokeRect(-20, -14, 40, 14);

            // El Ojo Láser del Robot
            ctx.save();
            ctx.fillStyle = "#ff2a6d";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff2a6d";
            ctx.beginPath();
            ctx.arc(0, -7, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 4. EL LÁSER VECTORIAL DE ESCANEO
            ctx.save();
            // Restauramos la rotación global solo para proyectar el láser hacia el suelo de forma limpia
            ctx.restore(); 
            
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            ctx.strokeStyle = "rgba(255, 42, 109, 0.4)";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff2a6d";

            // Calculamos el final del rayo sumando la rotación de la cabeza
            let laserX = Math.sin(anguloEscaneo) * 160;
            ctx.beginPath();
            ctx.moveTo(0, -7); 
            ctx.lineTo(laserX, 70 - bounce); 
            ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

        function render() {
            ctx.fillStyle = 'rgba(5, 8, 17, 0.25)';
            ctx.fillRect(0, 0, w, h);

            let t = Date.now();

            if (fase === "INTRO") {
                let listos = true;
                fragmentos.forEach(p => {
                    p.x += (p.targetX - p.x) * p.velocidad;
                    p.y += (p.targetY - p.y) * p.velocidad;
                    p.rotacion += (0 - p.rotacion) * p.velocidad;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotacion);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#00c8ff';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = "bold 40px monospace";
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(p.letra, 0, 0);
                    ctx.restore();

                    if (Math.abs(p.targetX - p.x) > 0.4) listos = false;
                });

                if (listos) {
                    fase = "ESPERA_INTRO";
                    tiempoControl = t;
                }

            } else if (fase === "ESPERA_INTRO") {
                ctx.save();
                ctx.shadowBlur = 30; ctx.shadowColor = '#00c8ff';
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 40px monospace";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(textoIntro, cX, cY);
                ctx.restore();

                if (t - tiempoControl > 1200) {
                    fase = "ROBOT_ACTIVO";
                    actualizarConsola();
                    setInterval(actualizarConsola, 3500);
                }

            } else if (fase === "ROBOT_ACTIVO") {
                // Cuadrícula sutil del radar de fondo
                ctx.strokeStyle = "rgba(0, 200, 255, 0.03)";
                for(let i=0; i<w; i+=50) {
                    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke();
                }

                // Dibujar suelo digital donde se apoya el Rover
                ctx.strokeStyle = "rgba(0, 200, 255, 0.15)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cX - 120, cY + 46);
                ctx.lineTo(cX + 120, cY + 46);
                ctx.stroke();

                // Dibujar el robot en el centro
                dibujarRobot(cX, cY - 10, t);
            }

            requestAnimationFrame(render);
        }

        inicializarIntro();
        setTimeout(render, 200);
    </script>
</body>
</html>
