<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Regalo para Mamá</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #030105; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

    <canvas id="regaloCanvas"></canvas>

    <script>
        const canvas = document.getElementById('regaloCanvas');
        const ctx = canvas.getContext('2d');

        let w, h, cX, cY;
        let fragmentos = [];
        const textoIntro = "BIENVENIDO";

        // Configuración de las frases que irán cambiando solas
        const frases = [
            "TE AMO MAMÁ",
            "GRACIAS POR SER LA MEJOR",
            "TU ABRAZO ES MI LUGAR SEGURO",
            "SOS EL MOTOR DE MI UNIVERSO",
            "GRACIAS POR TU PACIENCIA INFINITA"
        ];
        
        let faseActual = "INTRO"; // FASES: "INTRO", "ESPERA_INTRO", "CARRUSEL"
        let tiempoEsperaIntro = 0;
        
        let fraseIndex = 0;
        let fraseAlpha = 0;
        let fraseEstado = "ENTRANDO"; // ESTADOS: "ENTRANDO", "MOSTRANDO", "SALIENDO"
        let tiempoSostenerFrase = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function inicializarFragmentos() {
            fragmentos = [];
            ctx.font = "bold 44px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const anchoTotal = ctx.measureText(textoIntro).width;
            let startX = cX - anchoTotal / 2;

            for (let i = 0; i < textoIntro.length; i++) {
                let letra = textoIntro[i];
                let anchoLetraAnterior = ctx.measureText(textoIntro.substring(0, i)).width;
                let anchoLetraActual = ctx.measureText(letra).width;
                
                let targetX = startX + anchoLetraAnterior + anchoLetraActual / 2;
                let targetY = cY;

                let angulo = Math.random() * Math.PI * 2;
                let radioExplosion = Math.max(w, h) * 1.2; 

                fragmentos.push({
                    letra: letra,
                    x: cX + Math.cos(angulo) * radioExplosion,
                    y: cY + Math.sin(angulo) * radioExplosion,
                    targetX: targetX,
                    targetY: targetY,
                    rotacion: Math.random() * Math.PI * 6 - Math.PI * 3,
                    targetRotacion: 0,
                    velocidad: 0.03 + (Math.random() * 0.02)
                });
            }
        }

        function render() {
            // Fondo oscuro con estela para fluidez de movimiento
            ctx.fillStyle = 'rgba(3, 1, 5, 0.25)';
            ctx.fillRect(0, 0, w, h);

            if (faseActual === "INTRO") {
                let completado = true;

                fragmentos.forEach(p => {
                    let dx = p.targetX - p.x;
                    let dy = p.targetY - p.y;
                    let dr = p.targetRotacion - p.rotacion;

                    p.x += dx * p.velocidad;
                    p.y += dy * p.velocidad;
                    p.rotacion += dr * p.velocidad;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotacion);
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff2a6d';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = "bold 44px sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(p.letra, 0, 0);
                    ctx.restore();

                    if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) {
                        completado = false;
                    }
                });

                if (completado) {
                    faseActual = "ESPERA_INTRO";
                    tiempoEsperaIntro = Date.now();
                }

            } else if (faseActual === "ESPERA_INTRO") {
                // Mantiene el "BIENVENIDO" fijo y brillante por 2 segundos
                ctx.save();
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff2a6d';
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 44px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(textoIntro, cX, cY);
                ctx.restore();

                if (Date.now() - tiempoEsperaIntro > 2000) {
                    faseActual = "CARRUSEL";
                }

            } else if (faseActual === "CARRUSEL") {
                // Gestión automática del desvanecimiento de las frases
                if (fraseEstado === "ENTRANDO") {
                    fraseAlpha += 0.02; // Velocidad de aparición
                    if (fraseAlpha >= 1) {
                        fraseAlpha = 1;
                        fraseEstado = "MOSTRANDO";
                        tiempoSostenerFrase = Date.now();
                    }
                } else if (fraseEstado === "MOSTRANDO") {
                    if (Date.now() - tiempoSostenerFrase > 2500) { // Tiempo que dura visible la frase
                        fraseEstado = "SALIENDO";
                    }
                } else if (fraseEstado === "SALIENDO") {
                    fraseAlpha -= 0.02; // Velocidad de desaparición
                    if (fraseAlpha <= 0) {
                        fraseAlpha = 0;
                        fraseEstado = "ENTRANDO";
                        // Pasa a la siguiente frase, si llega al final vuelve a empezar
                        fraseIndex = (fraseIndex + 1) % frases.length;
                    }
                }

                // Renderizado de la frase actual en pantalla
                ctx.save();
                ctx.globalAlpha = fraseAlpha;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff2a6d';
                ctx.fillStyle = '#ffffff';
                
                // Reducimos dinámicamente la fuente si la frase es muy larga para el celular
                let tamañoFuente = w < 400 ? "20px" : "26px";
                ctx.font = `bold ${tamañoFuente} sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                ctx.fillText(frases[fraseIndex], cX, cY);
                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        inicializarFragmentos();
        setTimeout(render, 500);
    </script>
</body>
</html>
