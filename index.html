<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Casa de Mamá - Código Puro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #060b09; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Cuadro táctico premium para las frases */
        .hud-mensaje {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(4, 12, 8, 0.9);
            border: 1px solid rgba(42, 255, 150, 0.4);
            border-left: 4px solid #2aff96;
            padding: 14px 24px;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .hud-mensaje span {
            display: block;
            font-size: 9px;
            color: #2aff96;
            letter-spacing: 2px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }
    </style>
</head>
<body>

    <div id="mensajeHUD" class="hud-mensaje"><span>SISTEMA_AFECTIVO</span>TE AMO MAMÁ</div>
    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const mensajeHUD = document.getElementById('mensajeHUD');

        let w, h, cX, cY;
        let fragmentos = [];
        let humoChimenea = [];
        const textoIntro = "BIENVENIDO";
        
        let faseSistema = "INTRO"; 
        let tiempoControl = 0;

        const frases = [
            "TE AMO MAMÁ",
            "SOS MI LUGAR SEGURO EN EL MUNDO",
            "GRACIAS POR TU PACIENCIA Y AMOR INFINITO",
            "ESTE CODIGO LO ADORNA TU SONREIR"
        ];
        let fraseIndex = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function inicializarIntro() {
            fragmentos = [];
            ctx.font = "bold 44px sans-serif";
            const anchoTotal = ctx.measureText(textoIntro).width;
            let startX = cX - anchoTotal / 2;

            for (let i = 0; i < textoIntro.length; i++) {
                let letra = textoIntro[i];
                let targetX = startX + ctx.measureText(textoIntro.substring(0, i)).width + ctx.measureText(letra).width / 2;
                let angulo = Math.random() * Math.PI * 2;
                let radio = Math.max(w, h) * 1.3;

                fragmentos.push({
                    letra: letra,
                    x: cX + Math.cos(angulo) * radio,
                    y: cY + Math.sin(angulo) * radio,
                    targetX: targetX, targetY: cY,
                    rotacion: Math.random() * Math.PI * 4,
                    velocidad: 0.04
                });
            }
        }

        function cambiarFrase() {
            mensajeHUD.style.opacity = "0";
            mensajeHUD.style.transform = "translate(-50%, -60%)";
            
            setTimeout(() => {
                mensajeHUD.innerHTML = `<span>MATRIZ_MAMÁ // OPT_MAMÁ</span>${frases[fraseIndex]}`;
                mensajeHUD.style.opacity = "1";
                mensajeHUD.style.transform = "translate(-50%, -50%)";
                fraseIndex = (fraseIndex + 1) % frases.length;
            }, 600);
        }

        // DIBUJO VECTORIAL MATEMÁTICO DE LA CASA DE LA FOTO
        function dibujarCasaRender(x, y, escala) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(escala, escala);

            // 1. Cimiento / Base de piedra gris inferior
            ctx.fillStyle = "#4a5350";
            ctx.fillRect(-60, 35, 120, 15);
            ctx.strokeStyle = "#2f3533";
            ctx.lineWidth = 1;
            ctx.strokeRect(-60, 35, 120, 15);

            // 2. Estructura principal de dos pisos (Paredes Blancas)
            ctx.fillStyle = "#f4f7f5";
            ctx.fillRect(-55, -25, 110, 60);
            ctx.strokeStyle = "#cbd1ce";
            ctx.strokeRect(-55, -25, 110, 60);

            // 3. Techo principal oscuro inclinado (A dos aguas)
            ctx.fillStyle = "#1e2422";
            ctx.beginPath();
            ctx.moveTo(-62, -25);
            ctx.lineTo(0, -60);
            ctx.lineTo(62, -25);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 4. Chimenea lateral (Origen de las partículas de energía)
            ctx.fillStyle = "#3a423f";
            ctx.fillRect(40, -52, 10, 20);

            // 5. Las 2 Buhardillas superiores en el techo (Estructuras de ventanas del techo)
            function dibujarBuhardilla(posX) {
                ctx.fillStyle = "#f4f7f5";
                ctx.beginPath();
                ctx.moveTo(posX - 12, -25);
                ctx.lineTo(posX, -42);
                ctx.lineTo(posX + 12, -25);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Mini ventana de la buhardilla
                ctx.fillStyle = "#121a16";
                ctx.fillRect(posX - 5, -32, 10, 7);
            }
            dibujarBuhardilla(-25);
            dibujarBuhardilla(25);

            // 6. Ventanas cuadriculadas del Segundo Piso
            ctx.fillStyle = "#0f1c15"; // Fondo oscuro de cristal
            ctx.strokeStyle = "#cbd1ce"; // Marcos blancos
            ctx.lineWidth = 1;
            
            let ventanasPiso2 = [-40, -15, 15, 40];
            ventanasPiso2.forEach(vX => {
                ctx.fillRect(vX - 7, -15, 14, 16);
                ctx.strokeRect(vX - 7, -15, 14, 16);
                // Línea de cruz interna del marco
                ctx.beginPath();
                ctx.moveTo(vX, -15); ctx.lineTo(vX, 1);
                ctx.moveTo(vX - 7, -7); ctx.lineTo(vX + 7, -7);
                ctx.stroke();
            });

            // 7. Puerta central y Ventanas del Primer Piso
            ctx.fillStyle = "#261611"; // Puerta de madera marrón oscura
            ctx.fillRect(-8, 15, 16, 20);
            ctx.strokeRect(-8, 15, 16, 20);

            let ventanasPiso1 = [-42, -22, 22, 42];
            ctx.fillStyle = "#0f1c15";
            ventanasPiso1.forEach(vX => {
                ctx.fillRect(vX - 8, 12, 16, 16);
                ctx.strokeRect(vX - 8, 12, 16, 16);
                ctx.beginPath();
                ctx.moveTo(vX, 12); ctx.lineTo(vX, 28);
                ctx.moveTo(vX - 8, 20); ctx.lineTo(vX + 8, 20);
                ctx.stroke();
            });

            ctx.restore();
        }

        function gestionarParticulasHumo(cabañaX, cabañaY, escala) {
            // Coordenada exacta de salida de la chimenea calculada dinámicamente
            let chimeneaX = cabañaX + (45 * escala);
            let chimeneaY = cabañaY - (52 * escala);

            if (humoChimenea.length < 50) {
                humoChimenea.push({
                    x: chimeneaX,
                    y: chimeneaY,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: -(Math.random() * 0.6 + 0.4),
                    size: Math.random() * 3 + 2,
                    alpha: 1.0,
                    decay: Math.random() * 0.01 + 0.005
                });
            }

            ctx.save();
            for (let i = humoChimenea.length - 1; i >= 0; i--) {
                let p = humoChimenea[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    humoChimenea.splice(i, 1);
                    continue;
                }

                // Partículas verde esmeralda neón flotando hacia arriba
                ctx.fillStyle = `rgba(42, 255, 150, ${p.alpha * 0.45})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#2aff96';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (2 - p.alpha), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function render() {
            // Fondo oscuro con leve rastro estético
            ctx.fillStyle = 'rgba(6, 11, 9, 0.25)';
            ctx.fillRect(0, 0, w, h);

            if (faseSistema === "INTRO") {
                let listos = true;
                fragmentos.forEach(p => {
                    p.x += (p.targetX - p.x) * p.velocidad;
                    p.y += (p.targetY - p.y) * p.velocidad;
                    p.rotacion += (0 - p.rotacion) * p.velocidad;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotacion);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#2aff96';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = "bold 44px sans-serif";
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(p.letra, 0, 0);
                    ctx.restore();

                    if (Math.abs(p.targetX - p.x) > 0.4) listos = false;
                });

                if (listos) {
                    faseSistema = "ESPERA_INTRO";
                    tiempoControl = Date.now();
                }

            } else if (faseSistema === "ESPERA_INTRO") {
                ctx.save();
                ctx.shadowBlur = 30; ctx.shadowColor = '#2aff96';
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 44px sans-serif";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(textoIntro, cX, cY);
                ctx.restore();

                if (Date.now() - tiempoControl > 1500) {
                    faseSistema = "CASA_ACTIVA";
                    cambiarFrase();
                    setInterval(cambiarFrase, 4000);
                }

            } else if (faseSistema === "CASA_ACTIVA") {
                // Dibujamos las colinas matemáticas de fondo sutiles para darle el contexto de pradera de la imagen
                let t = Date.now() * 0.0004;
                ctx.fillStyle = "#040806";
                ctx.beginPath(); ctx.moveTo(0, h);
                for(let x=0; x<=w; x+=20){
                    ctx.lineTo(x, h*0.75 + Math.sin(x*0.005 + t)*10);
                }
                ctx.lineTo(w, h); ctx.fill();

                // Escala adaptativa para que entre perfecto en pantallas de teléfonos móviles
                let escalaCasa = w < 400 ? 1.8 : 2.4;
                let casaY = h * 0.62;

                // Llamada al motor de partículas de la chimenea
                gestionarParticulasHumo(cX, casaY, escalaCasa);

                // Renderizado en tiempo real de la cabaña blanca
                dibujarCasaRender(cX, casaY, escalaCasa);
            }

            requestAnimationFrame(render);
        }

        inicializarIntro();
        setTimeout(render, 200);
    </script>
</body>
</html>
