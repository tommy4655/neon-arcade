<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Bosque de Mamá</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #050b08; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .frase-hud {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 15, 10, 0.85);
            border: 1px solid rgba(42, 255, 150, 0.3);
            border-top: 3px solid #2aff96;
            padding: 12px 20px;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
    </style>
</head>
<body>

    <div id="fraseDOM" class="frase-hud">TE AMO MAMÁ</div>
    <canvas id="landscapeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('landscapeCanvas');
        const ctx = canvas.getContext('2d');
        const fraseDOM = document.getElementById('fraseDOM');

        let w, h, cX, cY;
        let fragmentos = [];
        let luciernagas = [];
        const textoIntro = "BIENVENIDO";
        
        let faseSistema = "INTRO"; 
        let tiempoControl = 0;

        const frases = [
            "TE AMO MAMÁ",
            "SOS MI LUGAR SEGURO EN EL MUNDO",
            "GRACIAS POR TU PACIENCIA Y AMOR",
            "SOS EL MOTOR DE MI UNIVERSO"
        ];
        let fraseIndex = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
            if(faseSistema === "BOSQUE") generarAmbiente();
        }
        window.addEventListener('resize', resize);
        resize();

        function inicializarIntro() {
            fragmentos = [];
            ctx.font = "bold 44px sans-serif";
            const anchoTotal = ctx.measureText(textoIntro).width;
            let startX = cX - anchoTotal / 2;

            for (let i = 0; i < textoIntro.length; i++) {
                let letra = textoIntro[i];
                let targetX = startX + ctx.measureText(textoIntro.substring(0, i)).width + ctx.measureText(letra).width / 2;
                let angulo = Math.random() * Math.PI * 2;
                let radio = Math.max(w, h) * 1.3;

                fragmentos.push({
                    letra: letra,
                    x: cX + Math.cos(angulo) * radio,
                    y: cY + Math.sin(angulo) * radio,
                    targetX: targetX, targetY: cY,
                    rotacion: Math.random() * Math.PI * 4,
                    velocidad: 0.04
                });
            }
        }

        function generarAmbiente() {
            luciernagas = [];
            for(let i=0; i<40; i++) {
                luciernagas.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.5 + 1,
                    speedY: -(Math.random() * 0.4 + 0.1),
                    speedX: Math.sin(Math.random() * 2) * 0.2,
                    seed: Math.random() * 100
                });
            }
        }

        function cicloFrases() {
            fraseDOM.style.opacity = "0";
            fraseDOM.style.transform = "translate(-50%, -60%)";
            
            setTimeout(() => {
                fraseDOM.innerText = frases[fraseIndex];
                fraseDOM.style.opacity = "1";
                fraseDOM.style.transform = "translate(-50%, -50%)";
                fraseIndex = (fraseIndex + 1) % frases.length;
            }, 800);
        }

        // Dibuja una capa de montañas/colinas con pinos matemáticos
        function dibujarColina(color, alturaBase, multiplicadorOnda, semillaTiempo, densidadPinos) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, h);
            
            for (let x = 0; x <= w; x += 10) {
                // Función Seno compuesta para simular las lomas orgánicas de tu foto
                let y = alturaBase + Math.sin(x * 0.004 + semillaTiempo) * multiplicadorOnda 
                          + Math.sin(x * 0.01 + semillaTiempo * 2) * (multiplicadorOnda * 0.3);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.fill();

            // Dibujar los pinos abstractos encima de la colina
            ctx.strokeStyle = color;
            for (let x = 10; x < w; x += densidadPinos) {
                let yBase = alturaBase + Math.sin(x * 0.004 + semillaTiempo) * multiplicadorOnda 
                              + Math.sin(x * 0.01 + semillaTiempo * 2) * (multiplicadorOnda * 0.3);
                
                // Geometría vectorial del pino
                ctx.lineWidth = Math.random() * 2 + 1;
                ctx.beginPath();
                ctx.moveTo(x, yBase);
                ctx.lineTo(x, yBase - (Math.random() * 15 + 10)); // Altura del árbol
                ctx.stroke();
            }
        }

        function render() {
            if (faseSistema === "INTRO" || faseSistema === "ESPERA_INTRO") {
                ctx.fillStyle = 'rgba(3, 8, 6, 0.25)';
                ctx.fillRect(0, 0, w, h);
            }

            if (faseSistema === "INTRO") {
                let listos = true;
                fragmentos.forEach(p => {
                    p.x += (p.targetX - p.x) * p.velocidad;
                    p.y += (p.targetY - p.y) * p.velocidad;
                    p.rotacion += (0 - p.rotacion) * p.velocidad;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotacion);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#2aff96';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = "bold 44px sans-serif";
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(p.letra, 0, 0);
                    ctx.restore();

                    if (Math.abs(p.targetX - p.x) > 0.4) listos = false;
                });

                if (listos) {
                    faseSistema = "ESPERA_INTRO";
                    tiempoControl = Date.now();
                }

            } else if (faseSistema === "ESPERA_INTRO") {
                ctx.save();
                ctx.shadowBlur = 30; ctx.shadowColor = '#2aff96';
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 44px sans-serif";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(textoIntro, cX, cY);
                ctx.restore();

                if (Date.now() - tiempoControl > 1500) {
                    faseSistema = "BOSQUE";
                    generarAmbiente();
                    cicloFrases();
                    setInterval(cicloFrases, 4000);
                }

            } else if (faseSistema === "BOSQUE") {
                // Render del paisaje matemático de la imagen
                // Cielo degradado oscuro de montaña
                let cielo = ctx.createLinearGradient(0, 0, 0, h);
                cielo.addColorStop(0, '#040d08');
                cielo.addColorStop(1, '#0b2416');
                ctx.fillStyle = cielo;
                ctx.fillRect(0, 0, w, h);

                let t = Date.now() * 0.0003;

                // Capa 1: Montañas lejanas y brumosas (Verde azulado muy oscuro)
                dibujarColina('#081a10', h * 0.55, 30, t, 35);

                // Capa 2: Bosque medio (El color de los pinos densos de tu foto)
                dibujarColina('#0c2b1a', h * 0.65, 20, t * 1.5, 20);

                // Capa 3: Pradera del frente (Verde claro texturizado)
                dibujarColina('#144027', h * 0.78, 15, t * 2, 12);

                // La Cabaña geométrica central (Fiel al paisaje)
                let cabañaX = cX - 20;
                let cabañaY = h * 0.76 + Math.sin(cabañaX * 0.004 + t * 2) * 15; // Anclada a la oscilación de la colina
                
                ctx.fillStyle = '#050f0a'; // Paredes
                ctx.fillRect(cabañaX, cabañaY, 30, 18);
                ctx.fillStyle = '#020503'; // Techo inclinado
                ctx.beginPath();
                ctx.moveTo(cabañaX - 4, cabañaY);
                ctx.lineTo(cabañaX + 15, cabañaY - 10);
                ctx.lineTo(cabañaX + 34, cabañaY);
                ctx.fill();

                // Luciérnagas / Clima flotante doradas
                ctx.save();
                luciernagas.forEach(l => {
                    l.y += l.speedY;
                    l.x += Math.sin(t * 5 + l.seed) * 0.3;
                    if (l.y < 0) l.y = h;

                    ctx.fillStyle = `rgba(180, 255, 150, ${0.3 + Math.sin(t * 10 + l.seed) * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(l.x, l.y, l.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        inicializarIntro();
        setTimeout(render, 300);
    </script>
</body>
</html>
