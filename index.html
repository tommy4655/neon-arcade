<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CINE_CODE: Regalo para Mamá</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #020504; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Subtítulos de la película (Frases de la trama) */
        .subtitulos-cine {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            z-index: 5;
            width: 80%;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .subtitulos-cine span {
            color: #2aff96;
            font-family: monospace;
            font-size: 10px;
            display: block;
            margin-bottom: 5px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="subtitulos" class="subtitulos-cine"><span>ESCENA_03 // AUDIO_LOG</span>TE AMO MAMÁ</div>
    <canvas id="cinemaCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cinemaCanvas');
        const ctx = canvas.getContext('2d');
        const subtitulos = document.getElementById('subtitulos');

        let w, h, cX, cY;
        let fragmentos = [];
        let lluvia = [];
        let humo = [];
        
        // Guion de la película (Línea de tiempo)
        let peliculaFase = "CREDITOS"; // FASES: "CREDITOS", "ESPERA_CREDITOS", "PANEO_CIELO", "PELICULA_ACTIVA"
        let tiempoFase = 0;
        let camaraY = -200; // Efecto de movimiento de cámara
        let opacidadPaisaje = 0;
        let relampagoEfecto = 0;

        const guionVoces = [
            "INICIANDO TRANSMISIÓN... SINTONÍA AFECTIVA LOGRADA.",
            "TE AMO MAMÁ. SOS EL MOTOR DE TODO MI UNIVERSO.",
            "ESCANEANDO ENTORNO... NINGÚN LUGAR ES TAN SEGURO COMO TU ABRAZO.",
            "PRODUCCIÓN COMPLETADA CON ÉXITO PARA LA MEJOR MAMÁ."
        ];
        let vozIndex = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function inicializarPelicula() {
            // Setup Créditos iniciales
            fragmentos = [];
            ctx.font = "bold 42px monospace";
            const texto = "FILM_PRESENTS";
            let startX = cX - ctx.measureText(texto).width / 2;
            for (let i = 0; i < texto.length; i++) {
                let angulo = Math.random() * Math.PI * 2;
                fragmentos.push({
                    letra: texto[i],
                    x: cX + Math.cos(angulo) * Math.max(w, h),
                    y: cY + Math.sin(angulo) * Math.max(w, h),
                    targetX: startX + ctx.measureText(texto.substring(0, i)).width + ctx.measureText(texto[i]).width / 2,
                    rotacion: Math.random() * 5, velocidad: 0.04
                });
            }

            // FX: Lluvia cinematográfica de fondo
            for(let i=0; i<60; i++) {
                lluvia.push({ x: Math.random() * w, y: Math.random() * h, v: Math.random() * 8 + 12, l: Math.random() * 15 + 10 });
            }
        }

        function proyeccionSubtitulos() {
            subtitulos.style.opacity = "0";
            setTimeout(() => {
                subtitulos.innerHTML = `<span>TRANS_MAMÁ // REC_ONLINE</span>"${guionVoces[vozIndex]}"`;
                subtitulos.style.opacity = "1";
                vozIndex = (vozIndex + 1) % guionVoces.length;
            }, 1000);
        }

        // ELEMENTO FX: DIBUJO VECTORIAL DE LA CABAÑA DE TU FOTO
        function cineDibujarCabaña(x, y, scale) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            ctx.fillStyle = "#f5f7f6"; ctx.fillRect(-40, -15, 80, 45); // Paredes blancas
            ctx.fillStyle = "#1a211e"; ctx.beginPath(); ctx.moveTo(-46, -15); ctx.lineTo(0, -42); ctx.lineTo(46, -15); ctx.closePath(); ctx.fill(); // Techo oscuro
            ctx.fillStyle = "#333b37"; ctx.fillRect(28, -35, 8, 15); // Chimenea
            ctx.fillStyle = "#101713"; ctx.fillRect(-5, 12, 11, 18); // Puerta
            ctx.fillStyle = "#fbffd4"; ctx.shadowBlur = 10; ctx.shadowColor = "#ffeb3b"; // Ventanas encendidas con luz cálida
            for(let vX of [-28, -12, 12, 28]) { ctx.fillRect(vX-5, -5, 10, 11); ctx.fillRect(vX-5, 12, 10, 11); }
            ctx.restore();
        }

        // ACTOR: EL ROBOT EXPLORADOR
        function cineDibujarRobot(x, y, t) {
            ctx.save(); ctx.translate(x, y);
            let oscila = Math.sin(t * 0.006) * 2;
            ctx.fillStyle = "#1e2b45"; ctx.fillRect(-22, -10 + oscila, 44, 26); // Chasis
            ctx.fillStyle = "#0d1421"; ctx.fillRect(-28, 15, 56, 10); // Orugas
            let radar = Math.sin(t * 0.003) * 0.5; // Escaneo del ojo
            ctx.translate(0, -10 + oscila); ctx.rotate(radar);
            ctx.fillStyle = "#ff2a6d"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff2a6d";
            ctx.beginPath(); ctx.arc(0, -12, 4, 0, Math.PI*2); ctx.fill(); // Ojo láser
            ctx.restore();
        }

        function render() {
            // Simulación de obturador de cámara de cine (Fondo oscuro)
            ctx.fillStyle = 'rgba(2, 5, 4, 0.3)';
            ctx.fillRect(0, 0, w, h);

            let temporal = Date.now();

            if (peliculaFase === "CREDITOS") {
                let listos = true;
                fragmentos.forEach(p => {
                    p.x += (p.targetX - p.x) * p.velocidad; p.y += (cY - p.y) * p.velocidad; p.rotacion += (0 - p.rotacion) * p.velocidad;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotacion);
                    ctx.shadowBlur = 15; ctx.shadowColor = '#2aff96'; ctx.fillStyle = '#ffffff';
                    ctx.font = "bold 38px monospace"; ctx.textAlign = "center"; ctx.fillText(p.letra, 0, 0);
                    ctx.restore();
                    if (Math.abs(p.targetX - p.x) > 0.5) listos = false;
                });
                if (listos) { peliculaFase = "ESPERA_CREDITOS"; tiempoFase = temporal; }

            } else if (peliculaFase === "ESPERA_CREDITOS") {
                ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = '#2aff96'; ctx.fillStyle = '#ffffff';
                ctx.font = "bold 38px monospace"; ctx.textAlign = "center"; ctx.fillText("FILM_PRESENTS", cX, cY); ctx.restore();
                if (temporal - tiempoFase > 1200) { peliculaFase = "PANEO_CIELO"; tiempoFase = temporal; }

            } else if (peliculaFase === "PANEO_CIELO" || peliculaFase === "PELICULA_ACTIVA") {
                // Control del movimiento vertical de la cámara (Traveling de arriba a abajo)
                if (camaraY < 0) camaraY += 2.5; 
                if (opacidadPaisaje < 1) opacidadPaisaje += 0.01;
                if (peliculaFase === "PANEO_CIELO" && camaraY >= 0) {
                    peliculaFase = "PELICULA_ACTIVA";
                    proyeccionSubtitulos();
                    setInterval(proyeccionSubtitulos, 5000);
                }

                ctx.save();
                ctx.globalAlpha = opacidadPaisaje;

                // 1. RENDER DE LA ATMÓSFERA Y EL PAISAJE (Inspirado en tu foto)
                let degradadoCielo = ctx.createLinearGradient(0, 0, 0, h);
                degradadoCielo.addColorStop(0, '#040b08'); degradadoCielo.addColorStop(1, '#0e2117');
                ctx.fillStyle = degradadoCielo; ctx.fillRect(0, 0, w, h);

                // Relámpagos aleatorios de tormenta de película
                if(Math.random() < 0.005) relampagoEfecto = 1;
                if(relampagoEfecto > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${relampagoEfecto})`;
                    ctx.fillRect(0, 0, w, h);
                    relampagoEfecto -= 0.1;
                }

                // FX: Caída de la lluvia sobre las lentes
                ctx.strokeStyle = "rgba(174, 219, 194, 0.2)"; ctx.lineWidth = 1;
                lluvia.forEach(r => {
                    r.y += r.v; if(r.y > h) { r.y = -20; r.x = Math.random() * w; }
                    ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y + r.l); ctx.stroke();
                });

                // 2. LAS COLINAS DE LA PRADERA (Con desfase de cámaraY)
                let frameTime = temporal * 0.0003;
                ctx.fillStyle = "#040b07"; ctx.beginPath(); ctx.moveTo(0, h);
                for(let x=0; x<=w; x+=20) { ctx.lineTo(x, (h * 0.58) + camaraY + Math.sin(x*0.004 + frameTime)*15); }
                ctx.lineTo(w, h); ctx.fill();

                ctx.fillStyle = "#091c12"; ctx.beginPath(); ctx.moveTo(0, h);
                for(let x=0; x<=w; x+=20) { ctx.lineTo(x, (h * 0.72) + camaraY + Math.sin(x*0.006 + frameTime*1.5)*10); }
                ctx.lineTo(w, h); ctx.fill();

                // 3. LA PROTAGONISTA: LA CABAÑA BLANCA DE DOS PISOS
                let casaPos_Y = (h * 0.62) + camaraY + Math.sin(cX * 0.004 + frameTime) * 15;
                cineDibujarCabaña(cX, casaPos_Y, 1.6);

                // FX: Humo realista saliendo de la chimenea
                if (humo.length < 30 && temporal % 3 === 0) {
                    humo.push({ x: cX + (28 * 1.6), y: casaPos_Y - (35 * 1.6), r: 2, a: 0.8 });
                }
                ctx.fillStyle = "rgba(42, 255, 150, 0.3)";
                for(let i=humo.length-1; i>=0; i--) {
                    let p = humo[i]; p.y -= 0.8; p.x += Math.sin(p.y*0.05)*0.2; p.a -= 0.01; p.r += 0.2;
                    if(p.a <= 0) { humo.splice(i, 1); continue; }
                    ctx.save(); ctx.globalAlpha = p.a; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
                }

                // 4. EL ACTOR SECUNDARIO: EL ROBOT EN LA PRADERA DEL FRENTE
                if (peliculaFase === "PELICULA_ACTIVA") {
                    let robotY = (h * 0.75) + camaraY;
                    cineDibujarRobot(cX - 70, robotY, temporal);
                }

                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        inicializarPelicula();
        setTimeout(render, 100);
    </script>
</body>
</html>
