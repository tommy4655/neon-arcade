<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Regalo Premium - Mamá</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #030105; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

    <canvas id="regaloCanvas"></canvas>

    <script>
        const canvas = document.getElementById('regaloCanvas');
        const ctx = canvas.getContext('2d');

        let w, h, cX, cY;
        let fragmentos = [];
        const textoIntro = "BIENVENIDO";

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function inicializarFragmentos() {
            fragmentos = [];
            // Ajustamos la fuente para que sea gigante e impactante en celular
            ctx.font = "bold 44px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const anchoTotal = ctx.measureText(textoIntro).width;
            let startX = cX - anchoTotal / 2;

            for (let i = 0; i < textoIntro.length; i++) {
                let letra = textoIntro[i];
                let anchoLetraAnterior = ctx.measureText(textoIntro.substring(0, i)).width;
                let anchoLetraActual = ctx.measureText(letra).width;
                
                // Punto exacto donde debe reconstruirse la letra en el centro
                let targetX = startX + anchoLetraAnterior + anchoLetraActual / 2;
                let targetY = cY;

                // Generamos la dispersión inicial masiva (fuera del teléfono como un vaso estallado)
                let angulo = Math.random() * Math.PI * 2;
                let radioExplosion = Math.max(w, h) * 1.2; 

                fragmentos.push({
                    letra: letra,
                    // Posición de inicio rota en el espacio profundo
                    x: cX + Math.cos(angulo) * radioExplosion + (Math.random() * 200 - 100),
                    y: cY + Math.sin(angulo) * radioExplosion + (Math.random() * 200 - 100),
                    targetX: targetX,
                    targetY: targetY,
                    // Rotación violenta inicial
                    rotacion: Math.random() * Math.PI * 6 - Math.PI * 3,
                    targetRotacion: 0,
                    // Factor de atracción elástica diferencial para que no lleguen todas al mismo tiempo
                    velocidad: 0.03 + (Math.random() * 0.025)
                });
            }
        }

        function render() {
            // Dejamos una estela sutil negra para el movimiento cinético
            ctx.fillStyle = 'rgba(3, 1, 5, 0.25)';
            ctx.fillRect(0, 0, w, h);

            let completado = true;

            fragmentos.forEach(p => {
                let dx = p.targetX - p.x;
                let dy = p.targetY - p.y;
                let dr = p.targetRotacion - p.rotacion;

                // Física de aproximación
                p.x += dx * p.velocidad;
                p.y += dy * p.velocidad;
                p.rotacion += dr * p.velocidad;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotacion);

                // Brillo de neón premium rosa/fucsia
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff2a6d';
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 44px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                ctx.fillText(p.letra, 0, 0);
                ctx.restore();

                // Si se siguen moviendo significativamente, la animación continúa
                if (Math.abs(dx) > 0.2 || Math.abs(dy) > 0.2) {
                    completado = false;
                }
            });

            if (!completado) {
                requestAnimationFrame(render);
            } else {
                // Bloque final fijo cuando ya se unieron los cristales
                ctx.fillStyle = '#030105';
                ctx.fillRect(0, 0, w, h);
                ctx.save();
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff2a6d';
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 44px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(textoIntro, cX, cY);
                ctx.restore();

                // AQUÍ DETENEMOS LA INTRO. 
                console.log("Cristal unido con éxito.");
            }
        }

        // Arranca el proceso automáticamente al cargar
        inicializarFragmentos();
        setTimeout(render, 800);
    </script>
</body>
</html>
