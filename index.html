<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Code - Edición Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background: #050a08; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Subtítulos estilo cine moderno */
        .subtitulos-hud {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 400;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            z-index: 5;
            width: 85%;
            max-width: 500px;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1.6;
        }
        .subtitulos-hud span {
            color: #51bda2;
            font-family: monospace;
            font-size: 9px;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="subText" class="subtitulos-hud"><span>Escena 01 // Transmisión</span>"Cargando secuencia..."</div>
    <canvas id="movieCanvas"></canvas>

    <script>
        const canvas = document.getElementById('movieCanvas');
        const ctx = canvas.getContext('2d');
        const subText = document.getElementById('subText');

        let w, h, cX, cY;
        let lluvia = [];
        let nieblaHumo = [];
        let destelloTormenta = 0;
        let estadoCine = "PANEO"; // PANEO, PELICULA
        let camY = -120;
        let introAlpha = 1;

        const lineasGuion = [
            "Estableciendo conexión en este rincón del mundo...",
            "Mamá: sos mi lugar seguro, mi guía y mi motor.",
            "Buscando en los registros... No existe amor más puro que el tuyo.",
            "Secuencia terminada. Gracias por ser la mejor todos los días."
        ];
        let guionIdx = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Inicializar efectos cinemáticos masivos
        function initFX() {
            lluvia = [];
            for(let i=0; i<110; i++) {
                lluvia.push({ x: Math.random() * w, y: Math.random() * h, speed: Math.random() * 12 + 15, len: Math.random() * 20 + 15, opacity: Math.random() * 0.15 + 0.05 });
            }
        }

        function avanzarSubtitulos() {
            subText.style.opacity = "0";
            setTimeout(() => {
                subText.innerHTML = `<span>Sintonía_Mamá // Registro_${guionIdx + 1}</span>"${lineasGuion[guionIdx]}"`;
                subText.style.opacity = "1";
                guionIdx = (guionIdx + 1) % lineasGuion.length;
            }, 800);
        }

        // Renderizado detallado con volumen de la Cabaña de tu foto
        function renderCasaCinematica(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Sombras ambientales inferiores para que no flote en la nada
            let shadowGrad = ctx.createRadialGradient(0, 35, 10, 0, 35, 90);
            shadowGrad.addColorStop(0, 'rgba(2, 8, 5, 0.7)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath(); ctx.ellipse(0, 35, 80, 15, 0, 0, Math.PI*2); ctx.fill();

            // 1. Base estructural de piedra (Gris con textura de profundidad)
            ctx.fillStyle = "#333a36";
            ctx.fillRect(-45, 20, 90, 15);
            ctx.fillStyle = "#272d2a"; // Lado en sombra para volumen 3D
            ctx.fillRect(5, 20, 40, 15);

            // 2. Paredes principales (Blanco roto con degradado de luz ambiental)
            let wallGrad = ctx.createLinearGradient(-40, 0, 40, 0);
            wallGrad.addColorStop(0, "#f1f5f3");
            wallGrad.addColorStop(0.6, "#e2e8f0");
            wallGrad.addColorStop(1, "#cbd5e1");
            ctx.fillStyle = wallGrad;
            ctx.fillRect(-42, -25, 84, 45);

            // 3. Techo a dos aguas complejo (Gris oscuro texturizado)
            ctx.fillStyle = "#1e293b";
            ctx.beginPath();
            ctx.moveTo(-48, -25);
            ctx.lineTo(0, -55);
            ctx.lineTo(48, -25);
            ctx.closePath();
            ctx.fill();
            
            // Sombra proyectada del techo sobre la pared
            ctx.fillStyle = "rgba(15, 23, 42, 0.25)";
            ctx.beginPath();
            ctx.moveTo(-42, -25); ctx.lineTo(0, -25); ctx.lineTo(0, -15);
            ctx.closePath(); ctx.fill();

            // 4. Chimenea realista trasera
            ctx.fillStyle = "#334155";
            ctx.fillRect(25, -46, 9, 25);
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(31, -46, 3, 25); // Relieve oscuro

            // 5. Buhardillas superiores (Las minicunas de techo de tu foto)
            function drawDormer(bx) {
                ctx.fillStyle = "#e2e8f0";
                ctx.beginPath();
                ctx.moveTo(bx - 10, -25); ctx.lineTo(bx, -40); ctx.lineTo(bx + 10, -25);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#0f172a"; // Mini ventana interior
                ctx.fillRect(bx - 4, -32, 8, 7);
            }
            drawDormer(-20);
            drawDormer(20);

            // 6. Ventanas con luz cálida interna realista (Efecto brillo suave)
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "rgba(254, 240, 138, 0.4)";
            ctx.fillStyle = "#fef08a";
            
            let vPos = [-30, -12, 12, 30];
            vPos.forEach(vx => {
                // Piso superior
                ctx.fillRect(vx - 5, -14, 10, 12);
                // Piso inferior
                ctx.fillRect(vx - 5, 4, 10, 12);
            });
            ctx.restore();

            // Marcos finos sobre las ventanas para dar realismo
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 0.5;
            vPos.forEach(vx => {
                ctx.strokeRect(vx - 5, -14, 10, 12);
                ctx.strokeRect(vx - 5, 4, 10, 12);
            });

            // Puerta principal central
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(-6, 4, 12, 16);

            ctx.restore();
        }

            // ACTOR: EL ROBOT EXPLORADOR CINEMÁTICO
            function renderRobotCine(x, y, t) {
                ctx.save();
                ctx.translate(x, y);

                let swing = Math.sin(t * 0.005) * 1.5;
                ctx.translate(0, swing);

                // Orugas y chasis detallado
                ctx.fillStyle = "#0f172a";
                ctx.fillRect(-20, 14, 40, 8);
                
                ctx.fillStyle = "#334155"; // Cuerpo metalizado
                ctx.fillRect(-14, -6, 28, 20);
                ctx.strokeStyle = "#475569";
                ctx.strokeRect(-14, -6, 28, 20);

                // Cabeza y visor óptico neón
                ctx.fillStyle = "#1e293b";
                ctx.fillRect(-6, -14, 12, 8);

                // Foco/Láser cinemático proyectado en el ambiente (Screen blend)
                let scanAngle = Math.sin(t * 0.002) * 0.6;
                ctx.save();
                ctx.globalCompositeOperation = "screen";
                let laserGrad = ctx.createRadialGradient(0, -10, 5, Math.sin(scanAngle)*80, 40, 120);
                laserGrad.addColorStop(0, "rgba(255, 42, 109, 0.75)");
                laserGrad.addColorStop(0.3, "rgba(255, 42, 109, 0.15)");
                laserGrad.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = laserGrad;
                
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(Math.sin(scanAngle)*80 - 40, 60);
                ctx.lineTo(Math.sin(scanAngle)*80 + 40, 60);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Punto luminoso del lente
                ctx.fillStyle = "#ff2a6d";
                ctx.beginPath(); ctx.arc(0, -10, 3, 0, Math.PI*2); ctx.fill();

                ctx.restore();
            }

        function render() {
            // Fondo cinematográfico: Niebla oscura y tormentosa
            let skyGrad = ctx.createLinearGradient(0, 0, 0, h);
            skyGrad.addColorStop(0, "#030706");
            skyGrad.addColorStop(0.5, "#08110d");
            skyGrad.addColorStop(1, "#0f1f18");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h);

            let time = Date.now();

            // Animación suave de la cámara al iniciar (Traveling vertical)
            if (estadoCine === "PANEO") {
                camY += (0 - camY) * 0.03;
                if (Math.abs(0 - camY) < 0.5) {
                    estadoCine = "PELICULA";
                    avanzarSubtitulos();
                    setInterval(avanzarSubtitulos, 5000);
                }
            }

            // FX Tormenta: Relámpagos atmosféricos esporádicos
            if (Math.random() < 0.004) destelloTormenta = 0.4;
            if (destelloTormenta > 0) {
                ctx.fillStyle = `rgba(167, 243, 208, ${destelloTormenta})`;
                ctx.fillRect(0, 0, w, h);
                destelloTormenta -= 0.04;
            }

            // 1. DIBUJO DE COLINAS CON PROFUNDIDAD DE CAMPO
            // Colina de fondo brumosa (Perspectiva aérea)
            ctx.fillStyle = "#07120e";
            ctx.beginPath(); ctx.moveTo(0, h);
            for(let x=0; x<=w; x+=30) {
                ctx.lineTo(x, (h * 0.55) + camY + Math.sin(x*0.003 + time*0.0002)*12);
            }
            ctx.lineTo(w, h); ctx.fill();

            // Colina principal donde descansa la cabaña
            ctx.fillStyle = "#0c1f17";
            ctx.beginPath(); ctx.moveTo(0, h);
            for(let x=0; x<=w; x+=20) {
                ctx.lineTo(x, (h * 0.68) + camY + Math.sin(x*0.005 + time*0.0004)*8);
            }
            ctx.lineTo(w, h); ctx.fill();

            // 2. RENDER DE LOS OBJETOS CINEMÁTICOS
            let houseY = (h * 0.58) + camY + Math.sin(cX*0.005 + time*0.0004)*8;
            renderCasaCinematica(cX, houseY, w < 450 ? 1.4 : 1.9);

            // Humo volumétrico cinemático (Partículas difuminadas y suaves, no círculos sólidos)
            if (time % 5 === 0) {
                let hScale = w < 450 ? 1.4 : 1.9;
                nieblaHumo.push({ x: cX + (28 * hScale), y: houseY - (46 * hScale), size: 4, alpha: 0.6 });
            }
            
            nieblaHumo.forEach((p, idx) => {
                p.y -= 0.6;
                p.x += Math.sin(p.y * 0.02) * 0.3;
                p.alpha -= 0.006;
                p.size += 0.2;

                if (p.alpha <= 0) {
                    nieblaHumo.splice(idx, 1);
                } else {
                    ctx.save();
                    let cloudGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    cloudGrad.addColorStop(0, `rgba(16, 185, 129, ${p.alpha * 0.25})`);
                    cloudGrad.addColorStop(1, "rgba(0,0,0,0)");
                    ctx.fillStyle = cloudGrad;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            });

            // 3. ACTOR ROBOT EN EL FRENTE DE LA ESCENA
            if (estadoCine === "PELICULA") {
                renderRobotCine(cX - 65, (h * 0.78) + camY, time);
            }

            // 4. FX CAPA SUPERIOR: EFECTO DE LLUVIA DIRECCIONAL CINEMÁTICA
            ctx.lineWidth = 1;
            lluvia.forEach(r => {
                r.y += r.speed;
                r.x -= r.speed * 0.1; // Caída diagonal por el viento simulado
                if (r.y > h) { r.y = -20; r.x = Math.random() * w; }
                ctx.strokeStyle = `rgba(209, 250, 229, ${r.opacity})`;
                ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x - r.len*0.1, r.y + r.len); ctx.stroke();
            });

            requestAnimationFrame(render);
        }

        initFX();
        render();
    </script>
</body>
</html>
