<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NÚCLEO MAMA v1.0</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none;
        }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Courier New', Courier, monospace; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        
        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 100, 150, 0.4);
            font-size: 10px;
            letter-spacing: 2px;
            z-index: 10;
        }

        .hud-footer {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ff527b;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 82, 123, 0.6);
            z-index: 10;
            border-top: 1px solid rgba(255, 82, 123, 0.2);
            padding-top: 12px;
        }

        .planet-card {
            position: absolute;
            background: rgba(10, 2, 5, 0.88);
            border: 1px solid rgba(255, 82, 123, 0.4);
            border-left: 3px solid #ff527b;
            padding: 6px 12px;
            color: #ffffff;
            font-size: 10px;
            pointer-events: none;
            z-index: 5;
            transform: translate(15px, -50%);
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            line-height: 1.4;
            white-space: nowrap;
        }
        .planet-card b { 
            color: #ff527b; 
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="hud-top">MATRIZ_AFECTIVA: ONLINE // CONEXIÓN_MADRE</div>
    
    <div id="ui-container" style="position: absolute; width:100%; height:100%; z-index:5; pointer-events:none;"></div>

    <div class="hud-footer">
        <div>NÚCLEO DE RECUERDOS - MAMA | MOMENTOS ACTIVOS: 4</div>
        <div>// AMOR_ETERNO //</div>
    </div>

    <canvas id="universeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('universeCanvas');
        const ctx = canvas.getContext('2d');
        const uiContainer = document.getElementById('ui-container');

        let cX, cY, w, h;
        let stars = [];
        let energyParticles = [];
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cX = w / 2; cY = h / 2;
            generarPolvoEstelar();
        }

        function generarPolvoEstelar() {
            stars = [];
            for(let i=0; i<120; i++) {
                stars.push({ 
                    x: Math.random() * w, 
                    y: Math.random() * h, 
                    r: Math.random() * 1.5, 
                    alpha: Math.random() * 0.6 + 0.4 
                });
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Datos modificados con mensajes directos hacia ella
        const recuerdos = [
            { id: "r1", name: "Tu Sonrisa", dist: 100, size: 6, speed: 0.012, angle: 0, color: '#ffb3d1', coreColor: '#ff3385', ecc: 0.85, msg: "La que ilumina cualquier día malo." },
            { id: "r2", name: "Tus Consejos", dist: 155, size: 7, speed: 0.008, angle: 1.8, color: '#ff99c2', coreColor: '#e6005c', ecc: 0.88, msg: "Mi guía en cada paso que doy." },
            { id: "r3", name: "Tu Abrazo", dist: 215, size: 6.5, speed: 0.006, angle: 3.5, color: '#ffccd5', coreColor: '#cc0044', ecc: 0.82, msg: "El lugar más seguro del mundo." },
            { id: "r4", name: "Tu Apoyo", dist: 290, size: 8, speed: 0.004, angle: 4.8, color: '#ff66a3', coreColor: '#990033', ecc: 0.86, msg: "Incondicional, siempre conmigo." }
        ];

        recuerdos.forEach(r => {
            const card = document.createElement('div');
            card.id = `card-${r.id}`;
            card.className = 'planet-card';
            card.innerHTML = `<b>${r.name.toUpperCase()}</b>${r.msg}`;
            uiContainer.appendChild(card);
        });

        function gestionarPlasma() {
            if (energyParticles.length < 35) {
                let ang = Math.random() * Math.PI * 2;
                energyParticles.push({
                    x: cX, y: cY,
                    vx: Math.cos(ang) * (Math.random() * 0.6 + 0.3),
                    vy: Math.sin(ang) * (Math.random() * 0.6 + 0.3),
                    life: 1.0,
                    decay: Math.random() * 0.015 + 0.008,
                    size: Math.random() * 4 + 2
                });
            }

            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            for (let i = energyParticles.length - 1; i >= 0; i--) {
                let p = energyParticles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) { energyParticles.splice(i, 1); continue; }

                ctx.fillStyle = `rgba(255, ${Math.floor(p.life * 100 + 100)}, 150, ${p.life * 0.35})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function renderEngine() {
            ctx.fillStyle = '#060103';
            ctx.fillRect(0, 0, w, h);

            // 1. Polvo Estelar Rosa/Blanco de Fondo
            ctx.fillStyle = '#ffb3cc';
            stars.forEach(s => {
                ctx.globalAlpha = s.alpha * (0.5 + Math.sin(Date.now() * 0.001 + s.x) * 0.5);
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // 2. Rejillas Vectoriales Suaves
            ctx.strokeStyle = 'rgba(255, 82, 123, 0.02)';
            ctx.lineWidth = 1;
            for(let i = 0; i < w; i += 65) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
            }

            // 3. Núcleo Central de Amor Viva
            gestionarPlasma();

            let time = Date.now();
            let corePulse = Math.sin(time * 0.003) * 3;
            
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            
            let glowGrad = ctx.createRadialGradient(cX, cY, 4, cX, cY, 65 + corePulse);
            glowGrad.addColorStop(0, 'rgba(255, 200, 220, 1)');
            glowGrad.addColorStop(0.3, 'rgba(255, 50, 120, 0.65)');
            glowGrad.addColorStop(0.7, 'rgba(150, 0, 50, 0.2)');
            glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath(); ctx.arc(cX, cY, 70 + corePulse, 0, Math.PI * 2); ctx.fill();

            let coreGrad = ctx.createRadialGradient(cX, cY, 0, cX, cY, 32);
            coreGrad.addColorStop(0, '#ffffff');
            coreGrad.addColorStop(0.5, '#ff66a3');
            coreGrad.addColorStop(1, '#ff0055');
            ctx.fillStyle = coreGrad;
            ctx.beginPath(); ctx.arc(cX, cY, 34, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // 4. Órbitas y Esferas de Cristales Flotantes
            recuerdos.forEach(r => {
                r.angle += r.speed;
                
                let px = cX + Math.cos(r.angle) * r.dist;
                let py = cY + Math.sin(r.angle) * r.dist * r.ecc;

                // Órbitas sutiles elegantes
                ctx.strokeStyle = 'rgba(255, 82, 123, 0.18)';
                ctx.lineWidth = 1.0;
                ctx.save();
                ctx.translate(cX, cY);
                ctx.scale(1, r.ecc);
                ctx.beginPath(); ctx.arc(0, 0, r.dist, 0, Math.PI * 2); ctx.stroke();
                ctx.restore();

                // Sombreado 3D de las esferas
                let angToSun = Math.atan2(py - cY, px - cX);
                let shadowX = px + Math.cos(angToSun + Math.PI) * (r.size * 0.4);
                let shadowY = py + Math.sin(angToSun + Math.PI) * (r.size * 0.4);

                let pGrad = ctx.createRadialGradient(shadowX, shadowY, 1, px, py, r.size);
                pGrad.addColorStop(0, r.color);
                pGrad.addColorStop(0.7, r.coreColor);
                pGrad.addColorStop(1, '#0c0205');

                ctx.save();
                ctx.fillStyle = pGrad;
                ctx.shadowBlur = 8;
                ctx.shadowColor = r.color;
                ctx.beginPath(); ctx.arc(px, py, r.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                // Actualizar cajas flotantes de texto
                const card = document.getElementById(`card-${r.id}`);
                if (card) {
                    card.style.left = `${px}px`;
                    card.style.top = `${py}px`;
                }
            });

            requestAnimationFrame(renderEngine);
        }

        renderEngine();
    </script>
</body>
</html>
